<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LeadPredictor Calculator</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <div class="dashboard">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="logo">
        <span class="icon">⬟</span>
        <h1>LeadPredictor</h1>
      </div>

      <div class="form-group">
        <label for="languageSelect" data-i18n="languageLabel">Language</label>
        <div class="language-select-wrapper">
          <div class="language-box">
            <img src="https://flagcdn.com/w40/us.png" alt="US flag">
            <span id="languageBoxLabel">English</span>
          </div>
          <select id="languageSelect" aria-label="Language">
            <option value="en">English</option>
            <option value="bg">Български</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label for="currencySelect" data-i18n="currencyLabel">Currency</label>
        <select id="currencySelect" aria-label="Currency">
          <option value="usd">$ US Dollar</option>
          <option value="eur">€ Euro</option>
        </select>
      </div>

      <div class="form-group">
        <label for="campaignStart" data-i18n="campaignStart">Campaign Start</label>
        <input id="campaignStart" type="date" value="2026-05-08">
      </div>

      <div class="form-group">
        <label for="campaignEnd" data-i18n="campaignEnd">Campaign End</label>
        <input id="campaignEnd" type="date" value="2026-11-04">
      </div>

      <div class="form-group">
        <label>
          <span data-i18n="totalRevenue">Total Revenue</span>
          <span class="currency-unit" data-currency-symbol>$</span>
        </label>
        <input type="number" id="revenue" value="10000">
      </div>

      <div class="form-group">
        <label>
          <span data-i18n="avgOrderValue">Avg. Order Value</span>
          <span class="currency-unit" data-currency-symbol>$</span>
        </label>
        <input type="number" id="aov" value="1000">
      </div>
    </aside>

    <!-- Main -->
    <main class="main">

      <!-- Chart Section -->
      <section class="top-panel">
        <div class="chart-box">
          <canvas id="leadChart" role="img" aria-label="Lead performance chart"></canvas>
        </div>

        <!-- Stats -->
        <div class="stats" role="group" aria-label="Performance Metrics">
          <div class="card" role="status" aria-live="polite" aria-atomic="true">
            <h3 data-i18n="prospects">📁 Prospects</h3>
            <div class="value" id="prospectsValue" aria-label="Total prospects">125</div>
            <div class="progress" role="progressbar" aria-valuenow="100" aria-valuemin="0" aria-valuemax="100" aria-label="Prospects progress">
              <span style="width:100%"></span>
            </div>
            <small>100%</small>
          </div>

          <div class="card" role="status" aria-live="polite" aria-atomic="true">
            <h3 data-i18n="leads">👤 Leads</h3>
            <div class="value" id="leadsValue" aria-label="Total leads">25</div>
            <div class="progress" role="progressbar" aria-valuenow="20" aria-valuemin="0" aria-valuemax="100" aria-label="Leads progress">
              <span style="width:20%"></span>
            </div>
            <small>20%</small>
          </div>

          <div class="card" role="status" aria-live="polite" aria-atomic="true">
            <h3 data-i18n="customers">🏆 Customers</h3>
            <div class="value" id="customersValue" aria-label="Total customers">10</div>
            <div class="progress" role="progressbar" aria-valuenow="8" aria-valuemin="0" aria-valuemax="100" aria-label="Customers progress">
              <span style="width:8%"></span>
            </div>
            <small>8%</small>
          </div>
        </div>
      </section>

      <!-- Sliders -->
      <section class="sliders" role="group" aria-label="Response Rate Settings">
        <div class="slider-group">
          <label for="leadRate">
            <span data-i18n="leadResponseRate">Lead Response Rate</span>
            <span id="leadRateLabel" aria-live="polite" aria-atomic="true">40%</span>
          </label>
          <input 
            type="range" 
            id="leadRate" 
            min="1" 
            max="100" 
            value="40"
            aria-label="Adjust lead response rate (1-100%)"
            aria-describedby="leadRateLabel"
          >
        </div>

        <div class="slider-group">
          <label for="prospectRate">
            <span data-i18n="prospectResponseRate">Prospect Response Rate</span>
            <span id="prospectRateLabel" aria-live="polite" aria-atomic="true">20%</span>
          </label>
          <input 
            type="range" 
            id="prospectRate" 
            min="1" 
            max="100" 
            value="20"
            aria-label="Adjust prospect response rate (1-100%)"
            aria-describedby="prospectRateLabel"
          >
        </div>
      </section>

    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
