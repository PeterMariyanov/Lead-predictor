<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LeadPredictor Calculator</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <div class="dashboard">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="logo">
        <span class="icon">⬟</span>
        <h1>LeadPredictor</h1>
      </div>

      <div class="form-group">
        <label for="languageSelect" data-i18n="languageLabel">Language</label>
        <select id="languageSelect" aria-label="Language">
          <option value="en">🇺🇸 English</option>
          <option value="bg">🇧🇬 Български</option>
        </select>
      </div>

      <div class="form-group">
        <label data-i18n="currencyLabel">Currency</label>
        <select>
          <option>$ US Dollar</option>
        </select>
      </div>

      <div class="form-group">
        <label data-i18n="campaignStart">Campaign Start</label>
        <input type="date" value="2026-05-08">
      </div>

      <div class="form-group">
        <label data-i18n="campaignEnd">Campaign End</label>
        <input type="date" value="2026-11-04">
      </div>

      <div class="form-group">
        <label data-i18n="totalRevenue">Total Revenue</label>
        <input type="number" id="revenue" value="10000">
      </div>

      <div class="form-group">
        <label data-i18n="avgOrderValue">Avg. Order Value</label>
        <input type="number" id="aov" value="1000">
      </div>
    </aside>

    <!-- Main -->
    <main class="main">

      <!-- Chart Section -->
      <section class="top-panel">
        <div class="chart-box">
          <canvas id="leadChart"></canvas>
        </div>

        <!-- Stats -->
        <div class="stats">
          <div class="card">
            <h3 data-i18n="prospects">📁 Prospects</h3>
            <div class="value" id="prospectsValue">125</div>
            <div class="progress">
              <span style="width:100%"></span>
            </div>
            <small>100%</small>
          </div>

          <div class="card">
            <h3 data-i18n="leads">👤 Leads</h3>
            <div class="value" id="leadsValue">25</div>
            <div class="progress">
              <span style="width:20%"></span>
            </div>
            <small>20%</small>
          </div>

          <div class="card">
            <h3 data-i18n="customers">🏆 Customers</h3>
            <div class="value" id="customersValue">10</div>
            <div class="progress">
              <span style="width:8%"></span>
            </div>
            <small>8%</small>
          </div>
        </div>
      </section>

      <!-- Sliders -->
      <section class="sliders">
        <div class="slider-group">
          <label>
            <span data-i18n="leadResponseRate">Lead Response Rate</span>
            <span id="leadRateLabel">40%</span>
          </label>
          <input type="range" id="leadRate" min="0" max="100" value="40">
        </div>

        <div class="slider-group">
          <label>
            <span data-i18n="prospectResponseRate">Prospect Response Rate</span>
            <span id="prospectRateLabel">20%</span>
          </label>
          <input type="range" id="prospectRate" min="0" max="100" value="20">
        </div>
      </section>

    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
